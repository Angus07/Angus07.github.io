---
layout: default
---

<article class="content-sheet">
  <header class="content-header">
    <span class="section-label">Page</span>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="content-summary">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="rich-text">
    {{ content }}
  </div>
</article>
